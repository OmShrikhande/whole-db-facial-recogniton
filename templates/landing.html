<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Face Recognition System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      padding: 1rem;
    }
    
    .container {
      max-width: 600px;
      width: 100%;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 3rem 2rem;
      box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }
    
    .header {
      margin-bottom: 2rem;
    }
    
    .icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }
    
    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      font-weight: 700;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
    }
    
    .subtitle {
      font-size: 1.1rem;
      opacity: 0.9;
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    
    @media (max-width: 500px) {
      .actions {
        grid-template-columns: 1fr;
      }
    }
    
    .btn {
      padding: 1.2rem 1.5rem;
      border: none;
      border-radius: 12px;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      color: white;
    }
    
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }
    
    .btn-verify {
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: 2px solid rgba(255, 255, 255, 0.3);
    }
    
    .btn-register {
      background: linear-gradient(135deg, #f093fb, #f5576c);
      border: 2px solid rgba(255, 255, 255, 0.3);
    }
    
    .btn-icon {
      font-size: 1.8rem;
    }
    
    form {
      display: contents;
    }
    
    .info-section {
      background: rgba(255, 255, 255, 0.05);
      border-left: 4px solid #667eea;
      padding: 1.2rem;
      border-radius: 8px;
      text-align: left;
      font-size: 0.95rem;
    }
    
    .info-section h3 {
      margin-bottom: 0.8rem;
      font-size: 1.05rem;
    }
    
    .info-section ul {
      list-style: none;
      padding-left: 0;
    }
    
    .info-section li {
      padding: 0.4rem 0;
      opacity: 0.9;
    }
    
    .info-section li:before {
      content: "✓ ";
      color: #f5576c;
      font-weight: bold;
      margin-right: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="icon">👤</div>
      <h1>Face Recognition</h1>
    </div>
    
    <p class="subtitle">Secure verification through facial recognition technology</p>
    
    <div class="actions">
      <form method="get" action="{{ url_for('camera') }}">
        <button class="btn btn-verify" type="submit">
          <span class="btn-icon">🔍</span>
          <span>Verify Face</span>
        </button>
      </form>
      
      <form method="get" action="{{ url_for('register') }}">
        <button class="btn btn-register" type="submit">
          <span class="btn-icon">➕</span>
          <span>Register</span>
        </button>
      </form>
    </div>
    
    <div class="info-section">
      <h3>How It Works</h3>
      <ul>
        <li>Register your face for secure identification</li>
        <li>Use the camera for real-time verification</li>
        <li>Instant results with advanced AI technology</li>
        <li>Secure and privacy-focused</li>
      </ul>
    </div>
  </div>
</body>
</html>
